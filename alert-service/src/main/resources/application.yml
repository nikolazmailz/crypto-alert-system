server:
  port: 8081

jwt:
  # Должен совпадать с jwt.secret в account-service!
  # В проде задавать через переменную окружения JWT_SECRET (одна для всех сервисов).
  secret: "${JWT_SECRET:crypto-alert-system-dev-secret-key-min-32-chars}"

app:
  events:
#    type: kafka # или 'internal'
    type: internal # или 'kafka'

spring:
  application:
    name: alert-service

  kafka:
    bootstrap-servers: localhost:9092

  liquibase:
    change-log: classpath:db/changelog/db.changelog-master.yaml
    enabled: true
    user: ${spring.datasource.username}
    password: ${spring.datasource.password}
    url: ${spring.datasource.url}

# ── Channel feature toggles (mirrored from notification-dispatcher) ───────────
# Enable whichever channel you have credentials for.
# EmailNotificationSender / TelegramNotificationSender are only instantiated
# when the corresponding flag is true, so misconfigured senders won't start.
notification:
  channels:
    email:
      enabled: ${NOTIFICATION_EMAIL_ENABLED:false}
    telegram:
      enabled: ${NOTIFICATION_TELEGRAM_ENABLED:false}

# ── Telegram Bot API ─────────────────────────────────────────────────────────
telegram:
  bot:
    token: ${TELEGRAM_BOT_TOKEN:}

# ── Actuator & Prometheus ─────────────────────────────────────────────────────
management:
  endpoints:
    web:
      exposure:
        # Открываем health (liveness/readiness) и prometheus-скрейпинг.
        # info и metrics — для удобства отладки в dev.
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: when-authorized
    prometheus:
      enabled: true
  metrics:
    tags:
      # Дополнительный тег для Prometheus-алертинга по среде.
      environment: "${APP_ENV:dev}"
    distribution:
      # Гистограммы для p50/p95/p99 в Grafana.
      percentiles-histogram:
        crypto.alert.triggered: true
        crypto.price.update.latency: true
        http.server.requests: true

