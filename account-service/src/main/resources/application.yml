spring:
  application:
    name: account-service
  webflux:
    problemdetails:
      enabled: true

#  r2dbc:
#    url: r2dbc:postgresql://localhost:5432/crypto_alert
#    username: postgres
#    password: postgres
#
  liquibase:
    change-log: classpath:db/changelog/db.changelog-master.yaml # Путь к вашему главному файлу
    enabled: true
    user: ${spring.datasource.username}
    password: ${spring.datasource.password}
    url: ${spring.datasource.url}

jwt:
  # Секрет должен быть >= 32 символов (256 бит) для HMAC-SHA256.
  # В проде задавать через переменную окружения: JWT_SECRET
  secret: "${JWT_SECRET:crypto-alert-system-dev-secret-key-min-32-chars}"
  expiration-ms: 3600000  # 1 час

server:
  port: 8083

# ── Actuator & Prometheus ─────────────────────────────────────────────────────
# Примечание: /actuator/prometheus защищён в SecurityConfig — доступ без JWT
# разрешён только для внутренней сети (Prometheus-скрейпер).
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: when-authorized
    prometheus:
      enabled: true
  metrics:
    tags:
      environment: "${APP_ENV:dev}"
    distribution:
      percentiles-histogram:
        http.server.requests: true
