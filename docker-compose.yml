services:

  # ── PostgreSQL ─────────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: crypto-alert-db
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: crypto_alert
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres

  # ── Prometheus ─────────────────────────────────────────────────────────────────
  # Скрейпит /actuator/prometheus каждые 15 с с хост-машины (где запущены сервисы).
  # UI: http://localhost:9090
  prometheus:
    image: prom/prometheus:v2.51.2
    container_name: crypto-alert-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      # Хранить метрики 15 дней — достаточно для dev/staging.
      - "--storage.tsdb.retention.time=15d"
      - "--web.enable-lifecycle"   # позволяет reload конфига через /-/reload
    # Нужно, чтобы контейнер мог дотянуться до Spring Boot-приложений на хосте.
    extra_hosts:
      - "host.docker.internal:host-gateway"

  # ── Grafana ────────────────────────────────────────────────────────────────────
  # Datasource (Prometheus) и папка дашбордов провижинятся автоматически.
  # Логин: admin / admin (меняется через GF_SECURITY_ADMIN_PASSWORD).
  # UI: http://localhost:3000
  grafana:
    image: grafana/grafana:10.4.2
    container_name: crypto-alert-grafana
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: "${GRAFANA_ADMIN_PASSWORD:-admin}"
      GF_USERS_ALLOW_SIGN_UP: "false"
      # Включаем unified alerting (Grafana 9+).
      GF_ALERTING_ENABLED: "true"
    volumes:
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - grafana-data:/var/lib/grafana
    depends_on:
      - prometheus

volumes:
  prometheus-data:
  grafana-data:
