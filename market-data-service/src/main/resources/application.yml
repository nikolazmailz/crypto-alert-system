#        maxAttempts: 3
#        waitDuration: 500ms
#    instances:
#      binanceClient:
#        baseConfig: default


binance:
  api:
    url: "https://api.binance.com"

# ── Actuator & Prometheus ─────────────────────────────────────────────────────
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: when-authorized
    prometheus:
      enabled: true
  metrics:
    tags:
      environment: "${APP_ENV:dev}"
    distribution:
      percentiles-histogram:
        crypto.price.update.latency: true
        http.server.requests: true
        # Resilience4j circuit-breaker вызовы — тоже гистограмма
        resilience4j.circuitbreaker.calls: true
