server:
  port: 8080

app:
  events:
#    type: kafka # или 'internal'
    type: internal # или 'kafka'

spring:
  application:
    name: market-data-service

  webflux:
    problemdetails:
      enabled: true

  kafka:
    bootstrap-servers: localhost:9092

  liquibase:
    change-log: classpath:db/changelog/db.changelog-master.yaml # Путь к вашему главному файлу
    enabled: true
    user: ${spring.datasource.username}
    password: ${spring.datasource.password}
    url: ${spring.datasource.url}

springdoc:
  swagger-ui:
    disable-swagger-default-url: true
    # Указываем путь к вашему существующему файлу
    url: /v3/api-docs
  api-docs:
    enabled: true

resilience4j:
  circuitbreaker:
    instances:
      binanceClient:
        registerHealthIndicator: true
        slidingWindowSize: 10
        permittedNumberOfCallsInHalfOpenState: 3
        slidingWindowType: COUNT_BASED
        minimumNumberOfCalls: 5
        waitDurationInOpenState: 10s
        failureRateThreshold: 50
        eventConsumerBufferSize: 10
  retry:
    instances:
      binanceClient:
        maxAttempts: 3
        waitDuration: 500ms
        retryExceptions:
          - org.springframework.web.reactive.function.client.WebClientResponseException
          - java.io.IOException

